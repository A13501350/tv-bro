name: Build Only

on:
  workflow_dispatch:  # 手动触发
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - gecko_included
          - gecko_excluded

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Build APKs
        run: |
          ./gradlew assembleGenericGeckoExcludedRelease
          
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: tvbro-builds
          path: app/build/outputs/apk/
          retention-days: 7
